---
# Required — set in playbook vars; cyberark_token is produced by the cyberark_auth role
cyberark_identity_tenant: ""

cyberark_validate_certs: true

# ---------------------------------------------------------------------------
# Groups to ensure exist
# ---------------------------------------------------------------------------
# Defaults to the two custom groups required by the cyberark_safe_management role.
# The three Privilege Cloud built-in groups (Administrators, Auditors, Safe Managers)
# are provisioned automatically by CyberArk and do not need to be created here.
cyberark_groups:
  - name: "Privilege Cloud Access Approvers"
    description: "Approvers for Privilege Cloud dual-control access requests"
  - name: "CyberArk Break Glass Access"
    description: "Emergency break glass access — full safe permissions, bypasses dual-control"
